name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -race

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r pyagent/requirements.txt pytest
      - name: Test
        run: pytest pyagent -q

  eval-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare .env (offline, no API key)
        run: cp .env.example .env
      - name: Compose up full stack
        run: docker compose up -d --build --wait
        timeout-minutes: 15
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Run offline eval suite (strict gate)
        run: go run ./cmd/evalctl -suite eval/suite-offline.yaml -db /tmp/eval-ci.db -strict
      - name: State visibility check (M7-2)
        run: |
          set -euo pipefail
          curl -s -X POST http://127.0.0.1:8000/v1/run -H 'Content-Type: application/json' \
            -d '{"task":"slow demo for state visibility","params":{"demo_delay_ms":"8000"}}' > /tmp/run.json &
          RUN_PID=$!
          sleep 3
          runs=$(curl -s http://127.0.0.1:8000/v1/runs)
          echo "live runs mid-flight: $runs"
          echo "$runs" | grep -q 'RUN_STATE_RUNNING' || { echo "FAIL: expected RUNNING in /v1/runs"; exit 1; }
          wait $RUN_PID
          cat /tmp/run.json
          grep -q '"status":"OK"' /tmp/run.json || { echo "FAIL: slow run did not finish OK"; exit 1; }
          runs_after=$(curl -s http://127.0.0.1:8000/v1/runs)
          echo "$runs_after" | grep -q 'RUN_STATE_DONE' || { echo "FAIL: expected DONE in /v1/runs after finish"; exit 1; }
      - name: Cancel lifecycle check (M7-3)
        run: |
          set -euo pipefail
          curl -s -X POST http://127.0.0.1:8000/v1/run -H 'Content-Type: application/json' \
            -d '{"task":"slow run to be cancelled","params":{"demo_delay_ms":"20000"}}' > /tmp/cancelled-run.json &
          RUN_PID=$!
          sleep 3
          tid=$(curl -s http://127.0.0.1:8000/v1/runs | grep -o '"traceId":"trace-[0-9]*"' | head -1 | cut -d'"' -f4)
          echo "cancelling $tid"
          cancel_resp=$(curl -s -X POST "http://127.0.0.1:8000/v1/run/$tid/cancel")
          echo "cancel response: $cancel_resp"
          echo "$cancel_resp" | grep -q 'CANCELLED' || { echo "FAIL: cancel endpoint did not accept"; exit 1; }
          wait $RUN_PID
          cat /tmp/cancelled-run.json
          grep -q '"status":"CANCELLED"' /tmp/cancelled-run.json || { echo "FAIL: original request did not end CANCELLED"; exit 1; }
          curl -s http://127.0.0.1:8000/v1/runs | grep -q 'RUN_STATE_CANCELLED' || { echo "FAIL: expected CANCELLED in /v1/runs"; exit 1; }
          trace_status=$(curl -s "http://127.0.0.1:8000/v1/trace/$tid" | grep -o '"status":"[A-Z]*"' | head -1)
          echo "durable trace: $trace_status"
          echo "$trace_status" | grep -q 'CANCELLED' || { echo "FAIL: durable trace not CANCELLED"; exit 1; }
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs
      - name: Compose down
        if: always()
        run: docker compose down -v
