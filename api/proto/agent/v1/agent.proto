syntax = "proto3";

// AgentRuntime = 非确定性智能层（Python / LangGraph 实现）。
// 由 Orchestrator 通过 gRPC 调用，运行一个 Agent 图并返回最终结果与执行轨迹。
package aios.agent.v1;

option go_package = "github.com/osije/ai-os/api/gen/go/agent/v1;agentv1";

service AgentRuntime {
  // 运行一个 Agent 图直到结束（unary，一次性返回）。
  rpc RunGraph(RunGraphRequest) returns (RunGraphReply);
  // 流式运行：逐 token 推送大模型输出（聊天式）。流式路径只做 路由+流式作答，
  // 不跑 reflect 循环；unary 路径保留全部能力。
  rpc RunGraphStream(RunGraphRequest) returns (stream StreamEvent);
}

// 流式事件。type 决定哪些字段有效。
message StreamEvent {
  string type = 1;          // node | token | done | error
  string trace_id = 2;
  string node = 3;          // 当前节点（supervisor/coding/...）
  string content = 4;       // token: 文本增量；node: 简述；error: 错误信息
  RunGraphReply final = 5;  // 仅 type=done 填充（完整 output/route/status/trace）
}

message RunGraphRequest {
  string trace_id = 1;             // 贯穿全链路的追踪 id
  string task = 2;                 // 用户任务 / 目标
  string agent = 3;                // 选择哪张图，如 "supervisor"
  map<string, string> params = 4;  // 额外参数
}

message RunGraphReply {
  string trace_id = 1;
  string output = 2;               // 最终回答
  string status = 3;               // OK / FAILED
  repeated NodeTrace trace = 4;    // 逐节点执行轨迹（对应 v4 的 Observability/Trace）
  string route = 5;                // supervisor 的路由决策：research / coding / review
  int32 prompt_tokens = 6;         // M6-C② 累计 prompt token 用量（offline 为 0）
  int32 completion_tokens = 7;     // M6-C② 累计 completion token 用量（offline 为 0）
}

// 单个节点的执行记录。
message NodeTrace {
  string node = 1;       // 节点名
  string type = 2;       // llm / tool / control
  string summary = 3;    // 简短摘要
  int64 latency_ms = 4;  // 耗时（毫秒）
}
