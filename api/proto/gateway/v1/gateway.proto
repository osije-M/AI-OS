syntax = "proto3";

// Gateway = 系统入口（Go / Kratos 实现）。对外暴露 HTTP/gRPC，做鉴权/限流/
// 路由，转发到 Orchestrator。对应 v4 第 2 节部署架构的 API Gateway。
// M3: HTTP 入口改为由 google.api.http 注解生成（契约先行），第三方 proto 已
// vendor 到 third_party/google/api。
package aios.gateway.v1;

import "google/api/annotations.proto";

option go_package = "github.com/osije/ai-os/api/gen/go/gateway/v1;gatewayv1";

service Gateway {
  rpc Run(RunRequest) returns (RunReply) {
    option (google.api.http) = {
      post: "/v1/run"
      body: "*"
    };
  }
}

message RunRequest {
  string task = 1;
  string agent = 2;
  map<string, string> params = 3;  // M7-2 透传到 orchestrator/agent（如测试钩子 demo_delay_ms）
}

message RunReply {
  string trace_id = 1;
  string output = 2;
  string status = 3;
  int32 prompt_tokens = 4;      // M6-C② 从 orchestrator.v1.RunTaskReply 透传，HTTP JSON 输出 promptTokens
  int32 completion_tokens = 5;  // M6-C② 从 orchestrator.v1.RunTaskReply 透传，HTTP JSON 输出 completionTokens
}
