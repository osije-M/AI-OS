syntax = "proto3";

// Orchestrator = 确定性内核的编排控制面（Go / Kratos 实现）。
// 接收 Gateway 下发的任务，驱动一次执行：调用 AgentRuntime(Python) 跑图，
// 汇总轨迹后返回。对应 v4 第 8 节 Orchestrator。
package aios.orchestrator.v1;

option go_package = "github.com/osije/ai-os/api/gen/go/orchestrator/v1;orchestratorv1";

service Orchestrator {
  rpc RunTask(RunTaskRequest) returns (RunTaskReply);
  // 流式：转发 AgentRuntime 的逐 token 输出（先过 Policy）。
  rpc RunTaskStream(RunTaskRequest) returns (stream StreamEvent);
  // M7-2：live 运行注册表查询（运行中/近期终态的 run 列表，内存态、单实例）。
  rpc ListRuns(ListRunsRequest) returns (ListRunsReply);
  // M7-3：取消在飞 run（协作式 best-effort：Go 侧掐 gRPC context，Python 检查点尽快退出；
  // 流式取消亚秒级，unary 在线最坏一个 LLM 调用时长）。
  rpc CancelRun(CancelRunRequest) returns (CancelRunReply);
}

message CancelRunRequest {
  string trace_id = 1;
}

message CancelRunReply {
  bool found = 1;       // false = 注册表里没有这个 trace（从未存在或已 TTL 驱逐）
  RunState state = 2;   // 取消已受理=CANCELLED（预期终态）；已终态=当前终态原样返回
}

// M7-2 run 生命周期状态（live 视图用；TraceStore 的 durable Status 维持字符串）。
// 终态单调不可逆；CANCELLED 由 M7-3 取消控制使用，BUDGET_EXCEEDED 由 M8 预算熔断使用，
// ORPHANED 是 durable 读时判定（RUNNING 超龄），不由注册表产生。
enum RunState {
  RUN_STATE_UNSPECIFIED = 0;
  RUN_STATE_RUNNING = 1;
  RUN_STATE_DONE = 2;
  RUN_STATE_FAILED = 3;
  RUN_STATE_DENIED = 4;
  RUN_STATE_CANCELLED = 5;
  RUN_STATE_ORPHANED = 6;
  RUN_STATE_BUDGET_EXCEEDED = 7;
}

// M7-2 单个 run 的 live 快照。
message RunInfo {
  string trace_id = 1;
  string task_preview = 2;      // 任务文本截断（80 字符）
  string route = 3;             // 路由确定后填充（unary 在 done 时，stream 随事件）
  RunState state = 4;
  string current_node = 5;      // 流式路径随 node 事件刷新；unary 粗粒度为空
  int64 started_at_ms = 6;      // orchestrator 本地时钟
  int64 last_event_at_ms = 7;   // 带内心跳：最近一次事件时间
  int64 elapsed_ms = 8;         // 运行中=now-started；终态=完成耗时
}

message ListRunsRequest {}

message ListRunsReply {
  repeated RunInfo runs = 1;
}

// 流式事件（与 agent.v1.StreamEvent 同形，orchestrator 转发时映射）。
message StreamEvent {
  string type = 1;     // node | token | done | error
  string trace_id = 2;
  string node = 3;
  string content = 4;
  RunTaskReply final = 5;  // 仅 type=done 填充
}

message RunTaskRequest {
  string task = 1;
  string agent = 2;                // 默认 "supervisor"
  map<string, string> params = 3;
}

message RunTaskReply {
  string trace_id = 1;
  string output = 2;
  string status = 3;                  // OK / FAILED
  repeated string node_summaries = 4; // 节点轨迹摘要（给客户端的精简视图）
  int32 prompt_tokens = 5;            // M6-C② 从 agent.v1.RunGraphReply 透传
  int32 completion_tokens = 6;        // M6-C② 从 agent.v1.RunGraphReply 透传
}
