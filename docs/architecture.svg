<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Segoe UI',system-ui,'PingFang SC','Microsoft YaHei',sans-serif">
  <!-- backdrop: light panel so it stays readable on GitHub dark mode too -->
  <rect x="0" y="0" width="1000" height="600" rx="14" fill="#FBFAF8" stroke="#E5E1DA" stroke-width="1.5"/>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#334155"/>
    </marker>
    <marker id="arrTrace" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#0D9488"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="26" y="36" font-size="22" font-weight="700" fill="#1E293B">AI-OS · 架构与服务拓扑</text>
  <text x="26" y="60" font-size="13.5" fill="#64748B">双流模型：Python/LangGraph 非确定性智能层（上）  +  Go/Kratos 确定性控制面（下）</text>

  <!-- ================= Intelligence band ================= -->
  <rect x="30" y="82" width="940" height="168" rx="12" fill="#F5F1FC" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="46" y="106" font-size="13.5" font-weight="700" fill="#6D28D9">① 非确定性智能层 · Python / LangGraph</text>
  <text x="720" y="106" font-size="12" fill="#8B5CF6">L1 retry · L3 换模型 · 无 key 离线兜底</text>

  <!-- AgentRuntime container -->
  <rect x="52" y="120" width="896" height="116" rx="10" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.3"/>
  <text x="66" y="140" font-size="12.5" font-weight="600" fill="#6D28D9">AgentRuntime  :9100  （supervisor → worker → reflect 有界循环）</text>

  <!-- supervisor -->
  <rect x="70" y="152" width="150" height="62" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3"/>
  <text x="145" y="178" font-size="13" font-weight="600" fill="#5B21B6" text-anchor="middle">supervisor</text>
  <text x="145" y="196" font-size="11" fill="#7C3AED" text-anchor="middle">动态路由(LLM+关键词)</text>

  <!-- workers (4 pills side by side) -->
  <rect x="250" y="146" width="360" height="74" rx="8" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.3"/>
  <text x="430" y="165" font-size="11.5" font-weight="600" fill="#7E22CE" text-anchor="middle">专职 worker（动态 4 选 1）</text>
  <g font-size="11" text-anchor="middle">
    <rect x="262" y="176" width="80" height="30" rx="6" fill="#FFFFFF" stroke="#C084FC"/>
    <text x="302" y="195" fill="#6B21A8">research</text>
    <rect x="350" y="176" width="80" height="30" rx="6" fill="#FFFFFF" stroke="#C084FC"/>
    <text x="390" y="195" fill="#6B21A8">coding</text>
    <rect x="438" y="176" width="80" height="30" rx="6" fill="#FFFFFF" stroke="#C084FC"/>
    <text x="478" y="195" fill="#6B21A8">review</text>
    <rect x="526" y="176" width="72" height="30" rx="6" fill="#FDE8F0" stroke="#EC4899"/>
    <text x="562" y="195" fill="#BE185D">audit</text>
  </g>

  <!-- reflect -->
  <rect x="630" y="152" width="150" height="62" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3"/>
  <text x="705" y="178" font-size="13" font-weight="600" fill="#5B21B6" text-anchor="middle">reflect</text>
  <text x="705" y="196" font-size="11" fill="#7C3AED" text-anchor="middle">自检 PASS/RETRY</text>

  <!-- internal arrows -->
  <line x1="220" y1="183" x2="248" y2="183" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="610" y1="183" x2="628" y2="183" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- ================= Control band ================= -->
  <rect x="30" y="300" width="940" height="278" rx="12" fill="#EAF1FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="46" y="324" font-size="13.5" font-weight="700" fill="#1D4ED8">② 确定性内核 · Go / Kratos 控制面（gateway / orchestrator / toolservice / tracestore）</text>

  <!-- Client -->
  <rect x="46" y="352" width="86" height="60" rx="8" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="89" y="387" font-size="13" font-weight="600" fill="#475569" text-anchor="middle">Client</text>

  <!-- Gateway -->
  <rect x="176" y="346" width="150" height="72" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
  <text x="251" y="372" font-size="13.5" font-weight="700" fill="#1E40AF" text-anchor="middle">Gateway</text>
  <text x="251" y="390" font-size="11" fill="#2563EB" text-anchor="middle">:8000 HTTP 入口</text>
  <text x="251" y="405" font-size="10.5" fill="#3B82F6" text-anchor="middle">SSE 流式 · /viewer</text>

  <!-- Orchestrator -->
  <rect x="372" y="346" width="176" height="72" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
  <text x="460" y="370" font-size="13.5" font-weight="700" fill="#1E40AF" text-anchor="middle">Orchestrator</text>
  <text x="460" y="388" font-size="11" fill="#2563EB" text-anchor="middle">:9300 编排 · 重试</text>
  <rect x="388" y="396" width="144" height="18" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="460" y="409" font-size="10.5" font-weight="600" fill="#B91C1C" text-anchor="middle">Policy 防火墙 Allow/Deny/Transform</text>

  <!-- ToolService -->
  <rect x="596" y="346" width="150" height="72" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
  <text x="671" y="372" font-size="13.5" font-weight="700" fill="#1E40AF" text-anchor="middle">ToolService</text>
  <text x="671" y="390" font-size="11" fill="#2563EB" text-anchor="middle">:9200 Tool Mesh</text>
  <text x="671" y="405" font-size="10.5" fill="#3B82F6" text-anchor="middle">工具即服务</text>

  <!-- auditserver (external, optional) -->
  <rect x="792" y="346" width="162" height="72" rx="8" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="873" y="370" font-size="12.5" font-weight="700" fill="#475569" text-anchor="middle">auditserver</text>
  <text x="873" y="388" font-size="11" fill="#64748B" text-anchor="middle">:9500 外部 OSS</text>
  <text x="873" y="404" font-size="10.5" fill="#94A3B8" text-anchor="middle">/spec+/invoke · full</text>

  <!-- TraceStore -->
  <rect x="372" y="486" width="290" height="66" rx="8" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.4"/>
  <text x="517" y="512" font-size="13.5" font-weight="700" fill="#0F766E" text-anchor="middle">TraceStore  :9400  可观测落盘（JSONL, 可回放）</text>
  <text x="517" y="532" font-size="11" fill="#0D9488" text-anchor="middle">GET /v1/trace/{id} · /viewer 网页 · tracectl CLI</text>

  <!-- request-flow arrows (solid) -->
  <line x1="132" y1="382" x2="174" y2="382" stroke="#334155" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="153" y="374" font-size="9.5" fill="#64748B" text-anchor="middle">HTTP</text>
  <line x1="326" y1="382" x2="370" y2="382" stroke="#334155" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="348" y="374" font-size="9.5" fill="#64748B" text-anchor="middle">gRPC</text>
  <line x1="746" y1="382" x2="790" y2="382" stroke="#334155" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="768" y="374" font-size="9.5" fill="#64748B" text-anchor="middle">代理</text>

  <!-- Orchestrator -> AgentRuntime (up into intelligence) -->
  <line x1="440" y1="346" x2="440" y2="238" stroke="#334155" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="448" y="292" font-size="10.5" fill="#475569">RunTask / RunTaskStream(流式)</text>

  <!-- AgentRuntime worker -> ToolService (down) -->
  <path d="M540,220 C600,270 640,300 660,344" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="612" y="300" font-size="10.5" fill="#475569">Tool Mesh 调工具</text>

  <!-- Orchestrator -> TraceStore (async trace, dashed teal) -->
  <path d="M488,418 C500,450 505,462 508,484" fill="none" stroke="#0D9488" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrTrace)"/>
  <text x="520" y="456" font-size="10.5" fill="#0F766E">异步 trace 落盘</text>

  <!-- Gateway -> TraceStore (query, dashed teal) -->
  <path d="M226,418 C210,470 250,486 390,500" fill="none" stroke="#0D9488" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrTrace)"/>
  <text x="196" y="470" font-size="10.5" fill="#0F766E">查链路</text>

  <!-- legend -->
  <line x1="600" y1="574" x2="628" y2="574" stroke="#334155" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="634" y="578" font-size="11" fill="#475569">请求流</text>
  <line x1="702" y1="574" x2="730" y2="574" stroke="#0D9488" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrTrace)"/>
  <text x="736" y="578" font-size="11" fill="#0F766E">可观测 trace 流</text>
  <rect x="852" y="567" width="16" height="14" rx="3" fill="#FFFFFF" stroke="#94A3B8" stroke-dasharray="4 3"/>
  <text x="874" y="578" font-size="11" fill="#64748B">可选(profile:full)</text>
</svg>
