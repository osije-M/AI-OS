version: v2
modules:
  - path: api/proto
  # 第三方 proto（google/api/*，从 kratos 模块缓存 vendor）。仅供 import 解析，
  # 不生成其 Go 代码（生成时用 buf generate --path api/proto 限定）。
  - path: third_party
lint:
  use:
    - STANDARD
  # 按 Kratos 官方惯例放宽：用 XxxReply 命名、服务名不强制 Service 后缀、
  # 目录用 api/<svc>/v1 而非完整包名路径。
  except:
    - PACKAGE_VERSION_SUFFIX
    - PACKAGE_DIRECTORY_MATCH
    - RPC_RESPONSE_STANDARD_NAME
    - SERVICE_SUFFIX
  ignore:
    - third_party
breaking:
  use:
    - FILE
  ignore:
    - third_party
